name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: [self-hosted, Linux, X64, wsl, governed-compression]
    steps:
      - actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: [self-hosted, Linux, X64, wsl, governed-compression]
    environment: testpypi
    steps:
      - actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          skip-existing: true

  validate-testpypi:
    needs: publish-testpypi
    runs-on: [self-hosted, Linux, X64, wsl, governed-compression]
    steps:
      - actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Wait for TestPyPI indexing
        run: sleep 15

      - name: Install from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            governed-compression

      - name: Smoke test
        run: |
          governed-compression --help
          python -c "import governed_compression; print('TestPyPI install OK')"

  publish:
    needs: validate-testpypi
    runs-on: [self-hosted, Linux, X64, wsl, governed-compression]
    if: github.event_name == 'release'
    environment: pypi
    steps:
      - actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
